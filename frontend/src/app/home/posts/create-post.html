<section class="bg-white rounded-xl shadow-sm border border-gray-200 p-4">
  <h2 class="text-lg font-semibold text-gray-900 mb-3">Create Post</h2>

  <form (submit)="submitPost($event)" class="space-y-3">
    <div>
      <label for="postText" class="block text-sm font-medium text-gray-700 mb-1">Text</label>
      <textarea
        id="postText"
        name="postText"
        [(ngModel)]="texte"
        rows="4"
        class="w-full rounded-md border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
        placeholder="What's happening?"
      ></textarea>
    </div>

    <div>
      <label for="postImage" class="block text-sm font-medium text-gray-700 mb-1"
        >Image URL (optional)</label
      >
      <input
        id="postImage"
        name="postImage"
        [(ngModel)]="image"
        type="text"
        class="w-full rounded-md border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
        placeholder="/uploads/filename.jpeg"
      />
    </div>

    <button
      type="submit"
      [disabled]="isSubmitting"
      class="inline-flex items-center justify-center rounded-md bg-blue-600 px-4 py-2 text-sm font-medium text-white hover:bg-blue-700 disabled:cursor-not-allowed disabled:opacity-60"
    >
      {{ isSubmitting ? 'Publishing...' : 'Publish' }}
    </button>
  </form>
</section>
