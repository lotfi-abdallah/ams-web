<section class="relative bg-hn-surface rounded border border-hn-border p-4 overflow-hidden">
  <h2 class="text-lg font-semibold text-hn-text mb-3">Créer un post</h2>

  @if (!isLoggedIn()) {
    <div
      class="absolute inset-0 z-10 bg-hn-bg-80 backdrop-blur-[1px] flex items-center justify-center px-4"
    >
      <p class="text-sm md:text-base font-medium text-hn-text text-center">
        <a href="/login" class="text-hn-orange hover:brightness-95 underline"
          >Veuillez vous connecter</a
        >
        pour publier.
      </p>
    </div>
  }

  <form
    (submit)="submitPost($event)"
    class="space-y-3 transition"
    [class.blur-sm]="!isLoggedIn()"
    [class.pointer-events-none]="!isLoggedIn()"
  >
    <div>
      <label for="postBody" class="block text-sm font-medium text-hn-text mb-1"
        >Contenu<b>*</b></label
      >
      <textarea
        id="postBody"
        name="postBody"
        [(ngModel)]="body"
        rows="4"
        class="w-full rounded border border-hn-border bg-hn-bg px-3 py-2 text-sm text-hn-text focus:outline-none focus:ring-2 focus:ring-hn-orange"
        placeholder="Que se passe-t-il ?"
      ></textarea>
    </div>

    <div>
      <label for="postImageUrl" class="block text-sm font-medium text-hn-text mb-1"
        >Image URL</label
      >
      <input
        id="postImageUrl"
        name="postImageUrl"
        [(ngModel)]="imageUrl"
        type="text"
        class="w-full rounded border border-hn-border bg-hn-bg px-3 py-2 text-sm text-hn-text focus:outline-none focus:ring-2 focus:ring-hn-orange"
        placeholder="https://example.com/image.jpg"
      />
    </div>

    <div>
      <label for="postImageTitle" class="block text-sm font-medium text-hn-text mb-1"
        >Image titre</label
      >
      <input
        id="postImageTitle"
        name="postImageTitle"
        [(ngModel)]="imageTitle"
        type="text"
        class="w-full rounded border border-hn-border bg-hn-bg px-3 py-2 text-sm text-hn-text focus:outline-none focus:ring-2 focus:ring-hn-orange"
        placeholder="Au studio !"
      />
    </div>

    <div>
      <label for="postHashtags" class="block text-sm font-medium text-hn-text mb-1">Hashtags</label>
      <input
        id="postHashtags"
        name="postHashtags"
        [(ngModel)]="hashtags"
        type="text"
        class="w-full rounded border border-hn-border bg-hn-bg px-3 py-2 text-sm text-hn-text focus:outline-none focus:ring-2 focus:ring-hn-orange"
        placeholder="#marseille, #jul, #13015"
      />
      <p class="mt-1 text-xs text-hn-muted">Séparez les hashtags par des virgules.</p>
    </div>

    <button
      type="submit"
      [disabled]="isSubmitting || !isLoggedIn()"
      class="inline-flex items-center justify-center rounded bg-hn-orange px-4 py-2 text-sm font-medium text-hn-text hover:brightness-95 disabled:cursor-not-allowed disabled:opacity-60"
    >
      {{ isSubmitting ? 'Publication...' : 'Publier' }}
    </button>
  </form>
</section>
