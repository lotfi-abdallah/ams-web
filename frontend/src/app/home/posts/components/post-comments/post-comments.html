<section class="mt-4 pt-4 border-t border-hn-border space-y-3">
  <div class="space-y-2 max-h-72 overflow-y-auto pr-1">
    @if (post().commentaires.length === 0) {
      <p class="text-xs text-hn-muted">Aucun commentaire pour le moment.</p>
    } @else {
      @for (comment of post().commentaires; track comment._id ?? comment.date) {
        <article class="rounded border border-hn-border bg-hn-bg p-2.5">
          <div class="min-w-0">
            <p class="text-xs text-hn-text font-semibold">{{ comment.auteur }}</p>
            <p class="text-xs text-hn-muted">{{ comment.date | date: 'short' }}</p>
          </div>

          <p class="text-sm text-hn-text whitespace-pre-wrap mt-1">{{ comment.texte }}</p>
        </article>
      }
    }
  </div>
</section>
