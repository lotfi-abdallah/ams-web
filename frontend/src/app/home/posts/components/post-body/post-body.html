<p class="text-sm text-hn-text whitespace-pre-wrap mb-3">{{ post().body }}</p>

@if (post().images?.url) {
  <img
    [src]="post().images?.url"
    [alt]="post().images?.title || 'Image de la publication'"
    class="w-full max-h-96 object-contain rounded border border-hn-border mb-3"
  />
}

@if ((post().hashtags ?? []).length) {
  <div class="flex flex-wrap gap-2 mb-3">
    @for (tag of post().hashtags ?? []; track tag) {
      <span class="px-2 py-1 text-xs rounded-full bg-hn-bg text-hn-muted border border-hn-border">
        {{ tag }}
      </span>
    }
  </div>
}
