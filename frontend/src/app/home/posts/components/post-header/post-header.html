<button
  type="button"
  (click)="onToggleWrap()"
  [attr.aria-label]="isWrapped() ? 'Deplier la publication' : 'Replier la publication'"
  [attr.aria-expanded]="!isWrapped()"
  class="w-full flex items-center justify-between gap-3 mb-3 rounded px-1 py-1 -mx-1 text-left cursor-pointer hover:bg-hn-bg focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-hn-orange"
>
  <div class="flex items-center gap-2 min-w-0">
    <div
      class="w-8 h-8 rounded-full bg-hn-bg text-hn-muted flex items-center justify-center text-xs font-semibold shrink-0 border border-hn-border"
    >
      {{ post().auteur.charAt(0).toUpperCase() }}
    </div>
    <p class="font-semibold text-hn-text truncate">{{ post().auteur }}</p>
    @if (isWrapped()) {
      <div class="text-xs text-hn-muted flex items-center gap-3 whitespace-nowrap">
        <span class="inline-flex items-center gap-1">
          <svg
            [lucideIcon]="heartIcon"
            class="w-3.5 h-3.5"
            [color]="isLikedByCurrentUser() ? '#ff6600' : '#a6a6a6'"
            [strokeWidth]="isLikedByCurrentUser() ? '3' : '2'"
          ></svg>
          <span>{{ post().likes.length }}</span>
        </span>
        <span class="inline-flex items-center gap-1">
          <svg [lucideIcon]="commentIcon" class="w-3.5 h-3.5"></svg>
          <span>{{ post().commentaires.length }}</span>
        </span>
      </div>
    }
  </div>
  <div class="flex items-center gap-2 shrink-0">
    <p class="text-xs text-hn-muted whitespace-nowrap">{{ post().date | date: 'short' }}</p>
    <span
      class="w-7 h-7 rounded border border-hn-border text-hn-muted inline-flex items-center justify-center"
      aria-hidden="true"
    >
      <svg
        [lucideIcon]="chevronIcon"
        class="w-4 h-4 transition-transform"
        [class.rotate-180]="!isWrapped()"
      ></svg>
    </span>
  </div>
</button>
