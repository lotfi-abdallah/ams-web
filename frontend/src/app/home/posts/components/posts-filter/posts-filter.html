<div class="flex flex-wrap items-center gap-2 pb-2 border-b border-hn-border">
  <select
    [ngModel]="sortOption()"
    (ngModelChange)="applySort($event)"
    class="text-xs border border-hn-border rounded px-2 py-1.5 bg-hn-surface text-hn-text"
  >
    <option value="newest">Plus récents</option>
    <option value="oldest">Plus anciens</option>
    <option value="mostLiked">Plus aimés</option>
  </select>

  <div
    class="inline-flex items-center gap-1 rounded border border-hn-border bg-hn-surface p-1 text-xs"
  >
    <button
      type="button"
      (click)="applyOwner('all')"
      class="px-2 py-1 rounded border border-transparent"
      [class.bg-hn-bg]="ownerOption() === 'all'"
      [class.text-hn-text]="ownerOption() === 'all'"
      [class.text-hn-muted]="ownerOption() !== 'all'"
    >
      Tous
    </button>
    <button
      type="button"
      (click)="applyOwner('mine')"
      [disabled]="!currentUser()?.id"
      class="px-2 py-1 rounded border border-transparent disabled:opacity-60 disabled:cursor-not-allowed"
      [class.bg-hn-bg]="ownerOption() === 'mine'"
      [class.text-hn-text]="ownerOption() === 'mine'"
      [class.text-hn-muted]="ownerOption() !== 'mine'"
    >
      Mes posts
    </button>
    <button
      type="button"
      (click)="applyOwner('others')"
      [disabled]="!currentUser()?.id"
      class="px-2 py-1 rounded border border-transparent disabled:opacity-60 disabled:cursor-not-allowed"
      [class.bg-hn-bg]="ownerOption() === 'others'"
      [class.text-hn-text]="ownerOption() === 'others'"
      [class.text-hn-muted]="ownerOption() !== 'others'"
    >
      Autres
    </button>
  </div>

  <input
    type="text"
    placeholder="Filtrer par hashtag..."
    [ngModel]="hashtagInput()"
    (ngModelChange)="hashtagInput.set($event)"
    (keyup.enter)="applyHashtag()"
    class="text-xs border border-hn-border rounded px-2 py-1.5 bg-hn-surface text-hn-text placeholder:text-hn-muted"
  />
  <button
    type="button"
    (click)="applyHashtag()"
    class="text-xs px-2 py-1.5 rounded border border-hn-border bg-hn-surface text-hn-muted hover:text-hn-text"
  >
    Filtrer
  </button>

  <label class="inline-flex items-center gap-2 text-xs text-hn-muted">
    <input
      type="checkbox"
      [ngModel]="hideShared()"
      (ngModelChange)="applyHideShared($event)"
      class="h-3.5 w-3.5 rounded border border-hn-border bg-hn-surface"
    />
    Masquer les partages
  </label>

  @if (hasActiveFilters) {
    <button
      type="button"
      (click)="clearFilters()"
      class="text-xs px-2 py-1.5 rounded border border-red-200 text-red-500 hover:text-red-700"
    >
      Effacer les filtres
    </button>
  }
</div>
