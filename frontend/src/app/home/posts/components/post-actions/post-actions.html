<footer class="text-xs text-hn-muted flex items-center gap-4">
  <button
    type="button"
    (click)="onToggleLike()"
    [disabled]="isLikeLoading()"
    class="inline-flex items-center gap-1.5 rounded px-1.5 py-1 border border-transparent hover:border-hn-border hover:bg-hn-bg disabled:cursor-not-allowed disabled:opacity-60 cursor-pointer transition"
    [class.text-hn-orange]="isLikedByCurrentUser()"
    [attr.aria-label]="isLikedByCurrentUser() ? 'Retirer le j\'aime' : 'Ajouter un j\'aime'"
  >
    <svg
      [lucideIcon]="heartIcon"
      class="w-3.5 h-3.5"
      [color]="isLikedByCurrentUser() ? '#ff6600' : '#a6a6a6'"
      [strokeWidth]="isLikedByCurrentUser() ? '3' : '2'"
    ></svg>
    <span [class.text-hn-orange]="isLikedByCurrentUser()">{{ post().likes }}</span>
  </button>
  @if (!post().shared) {
    <button
      type="button"
      (click)="onShareClicked()"
      class="inline-flex items-center gap-1.5 rounded px-1.5 py-1 border border-transparent hover:border-hn-border hover:bg-hn-bg cursor-pointer transition"
      aria-label="Partager"
    >
      <svg [lucideIcon]="shareIcon" class="w-3.5 h-3.5"></svg>
      <span>Partager</span>
    </button>
  }
  <button
    type="button"
    (click)="onToggleComments()"
    class="inline-flex items-center gap-1.5 rounded px-1.5 py-1 border border-transparent hover:border-hn-border hover:bg-hn-bg cursor-pointer transition"
    [attr.aria-label]="isCommentsOpen() ? 'Masquer les commentaires' : 'Afficher les commentaires'"
    [attr.aria-expanded]="isCommentsOpen()"
  >
    <svg [lucideIcon]="commentIcon" class="w-3.5 h-3.5"></svg>
    <span>{{ post().comments.length }}</span>
  </button>
</footer>
