<form
  (submit)="onSubmit($event)"
  class="rounded border border-hn-border bg-hn-surface p-3 space-y-3"
>
  <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
    <div>
      <label for="filterTags" class="block text-xs font-medium text-hn-muted mb-1">Tags</label>
      <input
        id="filterTags"
        name="filterTags"
        [(ngModel)]="tagsFilter"
        type="text"
        placeholder="angular, api"
        class="w-full rounded border border-hn-border bg-hn-bg px-3 py-2 text-sm text-hn-text focus:outline-none focus:ring-2 focus:ring-hn-orange"
      />
    </div>

    <div>
      <label for="filterFrom" class="block text-xs font-medium text-hn-muted mb-1">Depuis</label>
      <input
        id="filterFrom"
        name="filterFrom"
        [(ngModel)]="fromFilter"
        type="date"
        class="w-full rounded border border-hn-border bg-hn-bg px-3 py-2 text-sm text-hn-text focus:outline-none focus:ring-2 focus:ring-hn-orange"
      />
    </div>

    <div>
      <label for="filterTo" class="block text-xs font-medium text-hn-muted mb-1">Jusqu'au</label>
      <input
        id="filterTo"
        name="filterTo"
        [(ngModel)]="toFilter"
        type="date"
        class="w-full rounded border border-hn-border bg-hn-bg px-3 py-2 text-sm text-hn-text focus:outline-none focus:ring-2 focus:ring-hn-orange"
      />
    </div>
  </div>

  <div class="flex items-center gap-2">
    <button
      type="submit"
      [disabled]="isLoading() || isLoadingMore()"
      class="text-sm px-3 py-1.5 rounded border border-hn-border bg-hn-surface text-hn-muted hover:text-hn-text disabled:cursor-not-allowed disabled:opacity-60"
    >
      Filtrer
    </button>
    <button
      type="button"
      (click)="onClear()"
      [disabled]="isLoading() || isLoadingMore()"
      class="text-sm px-3 py-1.5 rounded border border-hn-border bg-hn-bg text-hn-muted hover:text-hn-text disabled:cursor-not-allowed disabled:opacity-60"
    >
      Reinitialiser
    </button>
  </div>
</form>
