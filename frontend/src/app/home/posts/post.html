<article class="bg-hn-surface rounded border border-hn-border p-4 my-4">
  <app-post-header
    [post]="post()"
    [isWrapped]="isWrapped()"
    [isLikedByCurrentUser]="isLikedByCurrentUser()"
    (toggleWrap)="toggleWrap()"
  />

  @if (!isWrapped()) {
    @if (!isEditing()) {
      <app-post-body [post]="post()" />
    } @else {
      <app-post-edit-form
        [body]="editBody"
        (bodyChange)="editBody = $event"
        [imageUrl]="editImageUrl"
        (imageUrlChange)="editImageUrl = $event"
        [imageTitle]="editImageTitle"
        (imageTitleChange)="editImageTitle = $event"
        [hashtags]="editHashtags"
        (hashtagsChange)="editHashtags = $event"
        [errorMessage]="editError()"
        [isSubmitting]="isEditSubmitting()"
        (submit)="submitEdit()"
        (cancel)="cancelEdit()"
      />
    }

    @if (post().shared) {
      <app-post-shared [sharedPost]="post().sharedPost" />
    }

    <app-post-actions
      [post]="post()"
      [isLikeLoading]="isLikeLoading()"
      [isLikedByCurrentUser]="isLikedByCurrentUser()"
      [isCommentsOpen]="isCommentsOpen()"
      [canManage]="canManagePost()"
      [isEditing]="isEditing()"
      [isDeleteSubmitting]="isDeleteSubmitting()"
      (toggleLike)="toggleLike()"
      (toggleComments)="toggleComments()"
      (shareClicked)="toggleShareForm()"
      (editClicked)="startEdit()"
      (deleteClicked)="confirmDelete()"
    />

    @if (showShareForm()) {
      <app-post-share-form
        [body]="shareText"
        (bodyChange)="shareText = $event"
        [errorMessage]="shareError()"
        [isSubmitting]="isShareSubmitting()"
        (submit)="submitShare()"
        (cancel)="cancelShare()"
      />
    }

    @if (isCommentsOpen()) {
      <app-post-comments [post]="post()" (postUpdated)="onPostUpdated($event)" />
    }
  }
</article>
