<div class="flex items-center justify-center min-h-[70vh] py-6">
  <div class="w-full max-w-md bg-hn-surface border border-hn-border rounded p-6 md:p-8">
    <h1 class="text-2xl font-bold text-hn-text mb-6 text-center">Connexion</h1>

    <form class="space-y-4" (submit)="onSubmit($event)">
      <div>
        <label for="email" class="block text-sm font-medium text-hn-text mb-1">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          [(ngModel)]="loginData().email"
          required
          class="w-full px-4 py-2 border border-hn-border bg-hn-bg text-hn-text rounded focus:ring-2 focus:ring-hn-orange outline-none"
        />
      </div>

      <div>
        <label for="password" class="block text-sm font-medium text-hn-text mb-1"
          >Mot de passe</label
        >
        <input
          id="password"
          name="password"
          type="password"
          [(ngModel)]="loginData().password"
          required
          class="w-full px-4 py-2 border border-hn-border bg-hn-bg text-hn-text rounded focus:ring-2 focus:ring-hn-orange outline-none"
        />
      </div>
      <button
        type="submit"
        class="w-full bg-hn-orange text-hn-text font-semibold py-2 rounded hover:brightness-95 transition cursor-pointer"
      >
        Se connecter
      </button>
    </form>
  </div>
</div>
