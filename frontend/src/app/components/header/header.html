<header class="bg-hn-orange border-b border-hn-border">
  <div class="max-w-4xl mx-auto px-3 md:px-4 py-2">
    <div class="flex justify-between items-center">
      <div class="shrink-0">
        <h1 class="text-lg font-bold text-hn-text">CERISoNet</h1>
      </div>
      <nav class="hidden md:flex">
        <ul class="flex space-x-6">
          <li><a href="/" class="text-sm text-hn-text hover:underline">Accueil</a></li>
        </ul>
      </nav>
      <div class="flex space-x-4">
        @if (auth.user()) {
          <a
            href="/profile"
            class="px-3 py-1 text-sm text-hn-text border border-hn-border rounded bg-hn-bg hover:bg-hn-surface"
          >
            Profile
          </a>
          <button
            (click)="logout()"
            class="px-3 py-1 text-sm text-hn-text border border-hn-border rounded bg-hn-bg hover:bg-hn-surface cursor-pointer"
          >
            Logout
          </button>
        } @else {
          <a
            href="/login"
            class="px-3 py-1 text-sm text-hn-text border border-hn-border rounded bg-hn-bg hover:bg-hn-surface"
          >
            Login
          </a>
        }
      </div>
    </div>
  </div>
</header>
